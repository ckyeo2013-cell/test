<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer 2D Shooter</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; overflow:hidden; }
        body { background:#222; display:flex; align-items:center; justify-content:center; height:100vh; }
        #ui { position:absolute; top:10px; left:10px; color:white; font-size:20px; z-index:10; }
        #crosshair { position:absolute; width:20px; height:20px; border:2px solid white; border-radius:50%; pointer-events:none; z-index:11; }
        #startScreen, #winScreen, #roomScreen { position:absolute; inset:0; background:rgba(0,0,0,0.9); color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
        #startScreen h1, #winScreen h1, #roomScreen h1 { font-size:50px; margin-bottom:20px; color:#00ccff; }
        #startScreen p, #roomScreen p { font-size:20px; margin-bottom:10px; }
        #startScreen button, #roomScreen button, #winScreen button { padding:12px 30px; font-size:22px; background:#00ccff; color:black; border:none; border-radius:8px; cursor:pointer; margin:5px; }
        #roomScreen input { padding:10px; font-size:22px; text-align:center; width:120px; margin:10px; border-radius:6px; border:none; }
        #winScreen { display:none; }
        #roomScreen { display:none; }
        canvas { background:linear-gradient(#87CEEB, #f0f9ff); border:3px solid #444; }
    </style>
</head>
<body>

<div id="startScreen">
    <h1>MULTIPLAYER SHOOTER</h1>
    <p>Play with friends — create or join a room</p>
    <button onclick="showRoomScreen()">PLAY NOW</button>
</div>

<div id="roomScreen">
    <h1>ROOM</h1>
    <button onclick="createRoom()">CREATE ROOM</button>
    <p id="roomCodeDisplay"></p>
    <p>OR ENTER CODE TO JOIN</p>
    <input type="text" id="joinCodeInput" maxlength="4" placeholder="CODE">
    <button onclick="joinRoom()">JOIN ROOM</button>
</div>

<div id="winScreen">
    <h1>🎉 YOU WON! 🎉</h1>
    <p>All enemies eliminated!</p>
    <button onclick="location.reload()">Play Again</button>
</div>

<div id="ui">
    <p>Health: <span id="health">100</span></p>
    <p>Enemies Left: <span id="enemies">2</span></p>
    <p>Players Online: <span id="players">1</span></p>
</div>
<div id="crosshair"></div>
<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let crosshair = document.getElementById("crosshair");

let keys = {};
let mouse = {x:0, y:0, down:false};
let running = false;

// --- MULTIPLAYER SETUP ---
let peer;
let myId;
let roomCode;
let hostId;
let connections = {};
let isHost = false;

let player = {
    x: 150, y: 300, w:30, h:50, speed:5, vx:0, vy:0,
    jumpForce:-14, gravity:0.6, onGround:false, health:100, angle:0
};
let players = {};
let bullets = [];
let enemies = [
    {id:"e1", x:700, y:300, w:30, h:50, health:50, speed:2, dir:-1},
    {id:"e2", x:400, y:150, w:30, h:50, health:50, speed:2, dir:1}
];
let platforms = [
    {x:0, y:550, w:1000, h:50},
    {x:200, y:450, w:150, h:20},
    {x:450, y:380, w:150, h:20},
    {x:700, y:300, w:150, h:20},
    {x:150, y:220, w:150, h:20},
    {x:600, y:180, w:150, h:20}
];

// --- SCREEN SWITCH ---
function showRoomScreen() {
    document.getElementById("startScreen").style.display = "none";
    document.getElementById("roomScreen").style.display = "flex";
}

// --- CREATE ROOM ---
function createRoom() {
    roomCode = Math.floor(1000 + Math.random() * 9000).toString();
    isHost = true;
    peer = new Peer(roomCode); // Host uses room code as ID
    peer.on('open', id => {
        myId = id;
        hostId = id;
        document.getElementById("roomCodeDisplay").textContent = `Your code: ${roomCode}`;
        startListening();
    });
}

// --- JOIN ROOM ---
function joinRoom() {
    roomCode = document.getElementById("joinCodeInput").value.trim();
    if (!roomCode) return;
    isHost = false;
    peer = new Peer();
    peer.on('open', id => {
        myId = id;
        connectToHost(roomCode);
        hostId = roomCode;
    });
    startListening();
}

function startListening() {
    peer.on('connection', conn => {
        connections[conn.peer] = conn;
        conn.on('data', data => handleData(data, conn.peer));
    });
    document.getElementById("roomScreen").style.display = "none";
    startGame();
}

function connectToHost(hostCode) {
    let conn = peer.connect(hostCode);
    conn.on('open', () => { connections[hostCode] = conn; });
    conn.on('data', data => handleData(data, hostCode));
}

function handleData(data, senderId) {
    if (data.type === 'state') players[senderId] = data.player;
    if (data.type === 'bullet') bullets.push(data.bullet);
    if (data.type === 'enemies') enemies = data.enemies;
}

function broadcast(data) {
    Object.values(connections).forEach(conn => conn.send(data));
}

// --- INPUT ---
document.addEventListener("keydown",e=>{keys[e.code]=true;});
document.addEventListener("keyup",e=>{keys[e.code]=false;});

document.addEventListener("mousemove",e=>{
    let rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    crosshair.style.left = e.clientX + "px";
    crosshair.style.top = e.clientY + "px";
    let dx = mouse.x - (player.x + player.w/2);
    let dy = mouse.y - (player.y + player.h/2);
    player.angle = Math.atan2(dy, dx);
});
document.addEventListener("mousedown",e=>{if(e.button===0) mouse.down=true;});
document.addEventListener("mouseup",e=>{if(e.button===0) mouse.down=false;});

// --- COLLISION ---
function checkCollision(a,b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// --- UPDATE ---
function update() {
    if(!running) return;

    // Player movement
    if(keys["KeyA"]) player.vx = -player.speed;
    else if(keys["KeyD"]) player.vx = player.speed;
    else player.vx *= 0.88;

    if(keys["KeyW"] && player.onGround) {
        player.vy = player.jumpForce;
        player.onGround = false;
    }

    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Platform collision
    player.onGround = false;
    platforms.forEach(p=>{
        if(checkCollision(player, p)) {
            if(player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            } else if(player.vy < 0 && player.y - player.vy >= p.y + p.h) {
                player.y = p.y + p.h;
                player.vy *= -0.3;
            } else {
                if(player.vx > 0) player.x = p.x - player.w;
                if(player.vx < 0) player.x = p.x + p.w;
            }
        }
    });

    if(player.x < 0) player.x = 0;
    if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    // Shoot
    if(mouse.down) {
        mouse.down = false;
        let b = {
            x: player.x + player.w/2, y: player.y + player.h/2,
            vx: Math.cos(player.angle)*12, vy: Math.sin(player.angle)*12, life:120
        };
        bullets.push(b);
        broadcast({type:'bullet', bullet:b});
    }

    // Update bullets & enemies (HOST ONLY controls enemies)
    if (isHost) {
        bullets.forEach((b,i)=>{
            b.x += b.vx; b.y += b.vy; b.life--;
            if(b.life <=0 || b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) return bullets.splice(i,1);
            enemies.forEach((e,ei)=>{
            if(b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
                e.health -= 25;
                bullets.splice(i,1);
                if(e.health <=0) enemies.splice(ei,1);
            }
        });
    });

        enemies.forEach(e=>{
            e.x += e.speed * e.dir;
            if(e.x < 100 || e.x + e.w > canvas.width - 100) e.dir *= -1;
        });

        broadcast({type:'enemies', enemies:enemies});
    } else {
        bullets.forEach((b,i)=>{ b.x += b.vx; b.y += b.vy; b.life--; if(b.life<=0) bullets.splice(i,1); });
    }

    // Win condition
    if(enemies.length === 0) {
        running = false;
        document.getElementById("winScreen").style.display = "flex";
    }

    // Send my state to everyone
    broadcast({type:'state', player:player});
    players[myId] = player;

    // Update UI
    document.getElementById("health").textContent = player.health;
    document.getElementById("enemies").textContent = enemies.length;
    document.getElementById("players").textContent = Object.keys(players).length;
}

// --- DRAW ---
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#553311";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    // Draw all players
    for(let pid in players) {
        let p = players[pid];
        ctx.save();
        ctx.translate(p.x + p.w/2, p.y + p.h/2);
        ctx.fillStyle = pid === myId ? "#0099ff" : "#ff6600";
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.rotate(p.angle);
        ctx.fillStyle = "#222";
        ctx.fillRect(0, -4, 30, 8);
        ctx.restore();
    }

    // Bullets
    ctx.fillStyle = "#ffff00";
    bullets.forEach(b=>{ ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill(); });

    // Enemies
    ctx.fillStyle = "#ff3300";
    enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));
}

// --- LOOP ---
function startGame() {
    running = true;
    requestAnimationFrame(loop);
}
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
