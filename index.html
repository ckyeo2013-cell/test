<!DOCTYPE html>
<html>
<head>
    <title>Chaos Shooter - FIXED MULTIPLAYER</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; overflow:hidden; }
        body { background:#222; display:flex; align-items:center; justify-content:center; height:100vh; width:100vw; touch-action:none; position:relative; }

        .screen {
            position:absolute; inset:0; background:rgba(0,0,0,0.9);
            color:white; display:flex; flex-direction:column;
            align-items:center; justify-content:center; z-index:50;
            opacity:0; pointer-events:none; padding:20px; transition:opacity 0.2s;
        }
        .screen.active { opacity:1; pointer-events:all; }

        h1 { font-size:clamp(32px, 8vw, 50px); margin-bottom:20px; color:#ffcc00; text-shadow:0 0 10px #ffcc0077; text-align:center; }
        p { font-size:clamp(16px, 4vw, 20px); margin-bottom:10px; text-align:center; }
        .error { color:#ff4444; font-size:16px; margin:8px; height:20px; }
        button {
            padding:clamp(10px, 3vw, 12px) clamp(20px, 5vw, 30px); 
            font-size:clamp(16px, 4vw, 20px); 
            background:#ffcc00; color:black; border:none; border-radius:8px;
            cursor:pointer margin:8px; box-shadow:0 4px 0 #aa8800;
            touch-action:manipulation; min-width:120px; font-weight:bold;
        }
        button.danger { background:#ff4444; box-shadow:0 4px 0 #aa2222; }
        button.small { padding:8px 16px; font-size:14px; }
        button:active { transform:translateY(4px); box-shadow:none; }
        input { padding:10px; font-size:18px; text-align:center; width:220px; margin:10px; border-radius:6px; border:none; }

        #ui { position:absolute; top:10px; left:10px; color:white; font-size:18px; z-index:10; background:rgba(0,0,0,0.5); padding:5px 10px; border-radius:8px; }
        #roomCode { position:absolute; top:10px; right:10px; color:#0f0; font-size:20px; font-weight:bold; z-index:11; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:6px; }
        #crosshair { position:absolute; width:20px; height:20px; border:2px solid white; border-radius:50%; pointer-events:none; z-index:12; transform:translate(-50%, -50%); }
        #leaveBtn { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:20; }
        #resetText { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:#ff4444; font-size:32px; font-weight:bold; z-index:30; background:rgba(0,0,0,0.7); padding:15px 30px; border-radius:10px; display:none; }
        #winText { position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); color:#00ff44; font-size:40px; font-weight:bold; z-index:40; background:rgba(0,0,0,0.8); padding:20px 40px; border-radius:12px; display:none; text-align:center; }
        #userInfo { position:absolute; top:10px; left:10px; color:#ffcc00; font-weight:bold; background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:6px; z-index:12; }

        #touchControls {
            position:absolute; bottom:20px; left:0; right:0;
            display:flex; justify-content:space-between;
            padding:0 20px; z-index:15; pointer-events:none; display:none;
        }
        #joystickArea { width:150px; height:150px; background:rgba(255,255,255,0.2); border-radius:50%; position:relative; pointer-events:auto; }
        #joystickKnob { width:40%; height:40%; background:rgba(255,255,255,0.8); border-radius:50%; position:absolute; top:30%; left:30%; pointer-events:none; }
        #shootBtn { width:120px; height:120px; background:rgba(255,0,0,0.6); border-radius:50%; border:2px solid white; font-size:20px; color:white; font-weight:bold; display:flex; align-items:center; justify-content:center; pointer-events:auto; }

        canvas { background:linear-gradient(#87CEEB, #f0f9ff); border:3px solid #444; width:100%; max-width:1000px; height:100%; max-height:600px; image-rendering:pixelated; }
    </style>
</head>
<body>

<!-- DEVICE SCREEN -->
<div id="deviceScreen" class="screen active">
    <h1>CHAOS SHOOTER</h1>
    <p>Are you playing on PC or Mobile?</p>
    <button onclick="setDevice('pc')">💻 PC / LAPTOP</button>
    <button onclick="setDevice('mobile')">📱 MOBILE / TABLET</button>
</div>

<!-- LOGIN / REGISTER — SECURED -->
<div id="loginScreen" class="screen">
    <h1>ACCOUNT</h1>
    <p id="loginTitle">Login or Create Account</p>
    <input type="text" id="user" placeholder="Username (3-12 chars)" maxlength="12">
    <input type="password" id="pass" placeholder="Password (min 4 chars)" maxlength="20">
    <div class="error" id="errorText"></div>
    <button onclick="handleLoginRegister()">CONTINUE</button>
    <button class="small" onclick="toggleMode()" id="modeBtn">Switch to Register</button>
</div>

<!-- MAIN MENU -->
<div id="homeScreen" class="screen">
    <h1>MAIN MENU</h1>
    <button onclick="startSolo()">SOLO MODE</button>
    <button onclick="showScreen('roomScreen')">MULTIPLAYER MODE</button>
</div>

<!-- MULTIPLAYER -->
<div id="roomScreen" class="screen">
    <h1>MULTIPLAYER</h1>
    <button onclick="createRoom()">CREATE NEW ROOM</button>
    <input type="text" id="joinCode" placeholder="ENTER CODE" maxlength="4">
    <button onclick="joinRoom()">JOIN ROOM</button>
    <button onclick="showScreen('homeScreen')">BACK</button>
</div>

<!-- GAME UI -->
<div id="userInfo"></div>
<div id="ui">
    <p>❤️ <span id="health">100</span></p>
    <p>👹 <span id="enemies">0</span></p>
    <p>👥 <span id="players">0</span></p>
    <p>🔫 <span id="kills">0</span></p>
    <p>🎖️ TEAM: <span id="teamText">-</span></p>
</div>
<div id="roomCode">ROOM: <span id="codeText">---</span></div>
<button id="leaveBtn" class="small danger" style="display:none;" onclick="leaveGame()">LEAVE GAME</button>
<div id="resetText">YOU DIED! RESTARTING LEVEL...</div>
<div id="winText">🎉 LEVEL COMPLETE! 🎉<br><button onclick="startSolo()">PLAY AGAIN</button><br><button onclick="showScreen('homeScreen')">MAIN MENU</button></div>
<div id="crosshair"></div>
<canvas id="c" width="1000" height="600"></canvas>

<!-- MOBILE CONTROLS -->
<div id="touchControls">
    <div id="joystickArea" ontouchstart="jStart(event)" ontouchmove="jMove(event)" ontouchend="jEnd(event)"><div id="joystickKnob"></div></div>
    <div id="shootBtn" ontouchstart="sStart()" ontouchend="sEnd()">SHOOT</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ACCOUNT SYSTEM
let deviceType = "";
let loggedIn = false;
let currentUsername = "";
let isRegisterMode = false;

function getAccounts() {
    return JSON.parse(localStorage.getItem('gameAccounts') || '{}');
}
function saveAccount(user, pass) {
    let acc = getAccounts();
    acc[user] = pass;
    localStorage.setItem('gameAccounts', JSON.stringify(acc));
}

function setDevice(type) {
    deviceType = type;
    document.getElementById('deviceScreen').classList.remove('active');
    if (type === 'mobile') document.getElementById('touchControls').style.display = 'flex';
    document.getElementById('loginScreen').classList.add('active');
}

function toggleMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('loginTitle').textContent = isRegisterMode ? "Create New Account" : "Login to Your Account";
    document.getElementById('modeBtn').textContent = isRegisterMode ? "Switch to Login" : "Switch to Register";
    document.getElementById('errorText').textContent = "";
}

function handleLoginRegister() {
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const err = document.getElementById('errorText');
    const accounts = getAccounts();

    if(!user || !pass) return err.textContent = "❌ Fill in both fields!";
    if(user.length < 3 || user.length > 12) return err.textContent = "❌ Username: 3-12 characters";
    if(pass.length < 4) return err.textContent = "❌ Password: min 4 characters";

    if(isRegisterMode) {
        if(accounts[user]) return err.textContent = "❌ Username already taken!";
        saveAccount(user, pass);
        loggedIn = true;
        currentUsername = user;
        document.getElementById('userInfo').textContent = "👤 " + currentUsername;
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('homeScreen').classList.add('active');
    } else {
        if(!accounts[user]) return err.textContent = "❌ Account not found — register first!";
        if(accounts[user] !== pass) return err.textContent = "❌ Wrong password!";
        loggedIn = true;
        currentUsername = user;
        document.getElementById('userInfo').textContent = "👤 " + currentUsername;
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('homeScreen').classList.add('active');
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if(id) document.getElementById(id).classList.add('active');
}

// GAME SETUP
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let running = false;
let gameMode = "";
let keys = {};
let mouse = {x:0,y:0,down:false};
let kills = 0;
let isDead = false;

// PLAYER
let p = {
    x:150,y:500,w:30,h:50,
    vx:0,vy:0,
    speed:0.6, maxSpeed:5, friction:0.92, jump:-14, gravity:0.6,
    onGround:false,health:100, maxHealth:100,
    angle:0,lastShot:0,fireRate:600,bulletSpeed:12,id:Math.random().toString(36).substr(2,6),
    team: "none", color: "#0099ff"
};

// BOTS
let bots = [];
function resetBots() {
    bots = [
        {x:850, y:500, w:30, h:50, health:100, maxHealth:100, 
         baseSpeed:1.1, speed:1.1, maxSpeed:7, 
         dir:-1, color:"#FF0000", vy:0, lastShot:0, onGround:false, 
         state:"patrol", detectRange:700, attackRange:450, 
         lastDodge:0, lastMoveChange:0, flankSide:1, lineOfSight:true, angle:0},
        {x:50, y:400, w:30, h:50, health:100, maxHealth:100, 
         baseSpeed:1.1, speed:1.1, maxSpeed:7,
         dir:1, color:"#FF2200", vy:0, lastShot:0, onGround:false, 
         state:"patrol", detectRange:700, attackRange:450, 
         lastDodge:0, lastMoveChange:0, flankSide:-1, lineOfSight:true, angle:0},
        {x:900, y:220, w:30, h:50, health:100, maxHealth:100, 
         baseSpeed:1.1, speed:1.1, maxSpeed:7,
         dir:-1, color:"#FF4400", vy:0, lastShot:0, onGround:false, 
         state:"patrol", detectRange:700, attackRange:450, 
         lastDodge:0, lastMoveChange:0, flankSide:1, lineOfSight:true, angle:0}
    ];
}

// PLATFORMS
const platforms = [
    {x:0,y:550,w:1000,h:50}, {x:200,y:450,w:150,h:20}, {x:450,y:380,w:150,h:20},
    {x:700,y:300,w:150,h:20}, {x:150,y:220,w:150,h:20}, {x:600,y:180,w:150,h:20}
];

let bullets = [];
let enemyBullets = [];

// ✅ MULTIPLAYER — FIXED COMPLETELY
let peer, roomId, connections = {}, otherPlayers = {};
let teamAssignCount = 0;

function createRoom() {
    FULL_RESET();
    peer = new Peer(undefined, {debug:0});
    peer.on('open', id=>{
        roomId = id.substr(0,4).toUpperCase();
        document.getElementById('codeText').textContent = roomId;
        gameMode = "multiplayer";
        // Assign team
        teamAssignCount++;
        p.team = teamAssignCount % 2 === 0 ? "red" : "blue";
        p.color = p.team === "red" ? "#ff3333" : "#3366ff";
        document.getElementById('teamText').textContent = p.team.toUpperCase();
        document.getElementById('teamText').style.color = p.color;
        startGame();
    });
    peer.on('connection', conn=>{
        connections[conn.connectionId] = conn;
        conn.on('data', d=>handleData(d, conn.connectionId));
        conn.on('close', ()=>delete otherPlayers[conn.connectionId]);
    });
}

function joinRoom() {
    FULL_RESET();
    roomId = document.getElementById('joinCode').value.trim().toUpperCase();
    peer = new Peer(undefined, {debug:0});
    peer.on('open', ()=>{
        const conn = peer.connect(roomId);
        conn.on('open', ()=>{
            connections[conn.connectionId] = conn;
            gameMode = "multiplayer";
            // Assign team
            teamAssignCount++;
            p.team = teamAssignCount % 2 === 0 ? "red" : "blue";
            p.color = p.team === "red" ? "#ff3333" : "#3366ff";
            document.getElementById('teamText').textContent = p.team.toUpperCase();
            document.getElementById('teamText').style.color = p.color;
            startGame();
        });
        conn.on('data', d=>handleData(d, conn.connectionId));
        conn.on('close', ()=>delete otherPlayers[conn.connectionId]);
    });
}

function handleData(d, id) {
    if(d.type === 'player') {
        otherPlayers[id] = d.player;
        otherPlayers[id].color = otherPlayers[id].team === "red" ? "#ff3333" : "#3366ff";
    }
    if(d.type === 'bullet') {
        bullets.push(d.bullet);
    }
    if(d.type === 'hit') {
        if(otherPlayers[id] && otherPlayers[id].team !== d.team) { 
            otherPlayers[id].health -= d.dmg;
            if(otherPlayers[id].health <= 0) delete otherPlayers[id];
        }
        if(d.target === p.id && p.team !== d.team) {
            p.health -= d.dmg;
            checkDeath();
        }
    }
}

function sendData(d) { 
    Object.values(connections).forEach(c=>c.send(d)); 
}

// START / RESET
function startSolo() {
    FULL_RESET();
    gameMode = "solo";
    resetBots();
    p.team = "none";
    p.color = "#0099ff";
    document.getElementById('teamText').textContent = "-";
    document.getElementById('winText').style.display = 'none';
    startGame();
}

function startGame() {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    running = true;
    isDead = false;
    document.getElementById('resetText').style.display = 'none';
    document.getElementById('leaveBtn').style.display = 'block';
}

function FULL_RESET() {
    running = false;
    gameMode = "";
    kills = 0;
    bullets = [];
    enemyBullets = [];
    isDead = false;
    p.x=150;p.y=500;p.vx=0;p.vy=0;p.health=100;

    if(peer) peer.destroy();
    peer = null;
    connections = {};
    otherPlayers = {};
    document.getElementById('codeText').textContent = "---";
}

function leaveGame() {
    FULL_RESET();
    document.getElementById('leaveBtn').style.display = 'none';
    showScreen('homeScreen');
}

// DEATH / WIN
function checkDeath() {
    if(p.health <= 0 && !isDead) {
        isDead = true;
        p.health = 0;
        if(gameMode === 'solo') {
            document.getElementById('resetText').style.display = 'block';
            setTimeout(()=>startSolo(), 2500);
        } else {
            document.getElementById('resetText').textContent = "YOU DIED! RESPAWNING...";
            document.getElementById('resetText').style.display = 'block';
            setTimeout(()=>{
                isDead=false; p.health=p.maxHealth; p.x=150; p.y=500; document.getElementById('resetText').style.display='none';
            },3000);
        }
    }
}

function checkWin() {
    if(gameMode === 'solo' && bots.length === 0 && running) {
        running = false;
        document.getElementById('winText').style.display = 'block';
    }
}

// INPUT
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);
document.addEventListener("mousemove",e=>{
    if(isDead) return;
    const r=canvas.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top;
    document.getElementById('crosshair').style.left=e.clientX+"px";document.getElementById('crosshair').style.top=e.clientY+"px";
    const dx=mouse.x-(p.x+p.w/2), dy=mouse.y-(p.y+p.h/2);p.angle=Math.atan2(dy,dx);
});
document.addEventListener("mousedown",e=>mouse.down=true);
document.addEventListener("mouseup",e=>mouse.down=false);

// MOBILE INPUT
let joy={active:false,start:{x:0,y:0},delta:{x:0,y:0}}; let shootTouch=false;
function jStart(e){if(isDead) return; joy.active=true;const t=e.touches[0];joy.start={x:t.clientX,y:t.clientY};}
function jMove(e){if(isDead || !joy.active)return;const t=e.touches[0];joy.delta={x:t.clientX-joy.start.x,y:t.clientY-joy.start.y};}
function jEnd(){joy.active=false;joy.delta={x:0,y:0};}
function sStart(){if(isDead) return; shootTouch=true;}
function sEnd(){shootTouch=false;}

// COLLISION
function collide(a,b){return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;}

// LINE OF SIGHT
function hasLineOfSight(attacker, target) {
    let clear = true;
    platforms.forEach(pl=>{
        if(attacker.y > pl.y && attacker.y < pl.y+pl.h && target.y > pl.y && target.y < pl.y+pl.h && 
           ((attacker.x < pl.x && target.x > pl.x+pl.w) || (attacker.x > pl.x+pl.w && target.x < pl.x))) clear=false;
    });
    return clear;
}

// UPDATE
function update(){
    if(!running)return;

    // PLAYER MOVEMENT
    if(!isDead){
        if(keys["KeyA"]) p.vx -= p.speed;
        if(keys["KeyD"]) p.vx += p.speed;
        if(joy.active){
            if(Math.abs(joy.delta.x) > 10) p.vx += (joy.delta.x>0?1:-1)*p.speed*1.5;
            if(joy.delta.y < -20 && p.onGround) {p.vy=p.jump;p.onGround=false;}
        }
        if(keys["KeyW"] && p.onGround) {p.vy=p.jump;p.onGround=false;}

        if(p.vx>p.maxSpeed)p.vx=p.maxSpeed; if(p.vx<-p.maxSpeed)p.vx=-p.maxSpeed;
        p.vx *= p.friction; if(Math.abs(p.vx)<0.1)p.vx=0;

        p.vy += p.gravity; p.x += p.vx; p.y += p.vy;
        if(p.x<0)p.x=0; if(p.x+p.w>canvas.width)p.x=canvas.width-p.w;
    }

    // PLATFORM COLLISION
    p.onGround=false;
    platforms.forEach(pl=>{
        if(collide(p,pl) && p.vy>=0 && p.y+p.h - pl.y <15) {p.y=pl.y-p.h;p.vy=0;p.onGround=true;}
    });
    if(p.y+p.h>canvas.height-10) {p.y=canvas.height-p.h-10;p.vy=0;p.onGround=true;}

    // SHOOT
    if(!isDead && (mouse.down||shootTouch)&&Date.now()-p.lastShot>p.fireRate){
        p.lastShot=Date.now();
        const b={x:p.x+p.w/2,y:p.y+p.h/2,w:7,h:7,vx:Math.cos(p.angle)*p.bulletSpeed,vy:Math.sin(p.angle)*p.bulletSpeed,life:120,dmg:25,owner:p.id, team:p.team};
        bullets.push(b);
        if(gameMode==="multiplayer")sendData({type:'bullet',bullet:b});
    }

    // SOLO MODE LOGIC
    if(gameMode==="solo"){
        bots.forEach(b=>{
            const distX = p.x - b.x;
            const distY = p.y - b.y;
            const dist = Math.hypot(distX, distY);
            b.angle = Math.atan2(p.y - (b.y+b.h/2), p.x - (b.x+b.w/2));
            b.lineOfSight = hasLineOfSight(b, p);

            // DODGE
            let danger = false;
            bullets.forEach(bl=>{
                if(Math.hypot(bl.x-b.x, bl.y-b.y) < 160 && Date.now()-b.lastDodge>800) {
                    danger=true; b.lastDodge=Date.now();
                    if(b.onGround) {
                        if(Math.random()>0.5) {b.vy=-13;b.onGround=false;}
                        else {b.dir *= -1; b.speed = b.baseSpeed * 1.8;}
                    }
                }
            });

            // SMART STATES
            if(danger) b.state = "dodge";
            else if(b.health < 30) { 
                if(dist < 300) b.state = "retreat_smart";
                else if(dist > 500) b.state = "advance_flank";
                else b.state = "attack_careful";
            }
            else if(dist < b.attackRange && b.lineOfSight) b.state = "attack";
            else if(dist < b.detectRange) b.state = "advance";
            else b.state = "patrol";

            // MOVEMENT LOGIC
            if(b.state === "patrol") {
                if(b.x<50 || b.x+b.w>canvas.width-50) b.dir*=-1;
                b.speed = b.baseSpeed * 0.9;
            }
            else if(b.state === "advance") {
                if(Date.now()-b.lastMoveChange>2000) { b.flankSide *= -1; b.lastMoveChange=Date.now(); }
                b.dir = (distX + b.flankSide*110) >0 ?1:-1;
                b.speed = b.baseSpeed * 1.4;
                if(b.onGround && distY < -60 && Math.abs(distX)<160 && Math.random()>0.75) {b.vy=-14;b.onGround=false;}
            }
            else if(b.state === "attack") {
                if(!b.lineOfSight) {
                    b.dir = distX>0?1:-1;
                    b.speed = b.baseSpeed * 1.1;
                } else {
                    if(Math.random() < 0.01) b.dir *= -1;
                    b.speed = b.baseSpeed * 0.7;
                    if(dist < 180) b.dir *= -1;
                }
            }
            else if(b.state === "retreat_smart") {
                b.dir = distX>0?-1:1;
                b.speed = b.baseSpeed * 2.2;
                if(b.onGround && Math.random()>0.6) b.vy=-12;
            }
            else if(b.state === "advance_flank") {
                b.flankSide = distX >0 ? -1 : 1;
                b.dir = b.flankSide;
                b.speed = b.baseSpeed * 1.8;
            }
            else if(b.state === "attack_careful") {
                b.speed = b.baseSpeed * 0.4;
                b.dir = Math.random()>0.7 ? 1 : -1;
            }
            else if(b.state === "dodge") {
                b.speed = b.baseSpeed * 2.5;
            }

            // APPLY MOVEMENT
            b.x += b.speed * b.dir;
            if(b.x < 40) {b.x=40; b.dir *= -1;}
            if(b.x + b.w > canvas.width - 40) {b.x = canvas.width - 40 - b.w; b.dir *= -1;}

            // GRAVITY
            b.vy += 0.6; b.y += b.vy; b.onGround=false;
            platforms.forEach(pl=>{
                if(collide(b,pl) && b.vy>=0 && b.y+b.h - pl.y <18) {b.y=pl.y-b.h;b.vy=0;b.onGround=true;}
            });
            if(b.y+b.h>canvas.height-10) {b.y=canvas.height-b.h-10;b.vy=0;b.onGround=true;}

            // SHOOT
            let fireRate = b.health < 30 ? (dist < 400 ? 900 : 1400) : (b.lineOfSight ? (dist<300?700:1000) : 2200);
            if(b.state !== "retreat_smart" && dist < b.attackRange && Date.now()-b.lastShot>fireRate){
                b.lastShot=Date.now();
                enemyBullets.push({x:b.x + b.w/2, y:b.y + b.h/2, w:7, h:7, vx:Math.cos(b.angle)*9, vy:Math.sin(b.angle)*9, life:120, dmg:18});
            }
        });

        // BULLET COLLISIONS
        for(let i=bullets.length-1;i>=0;i--){
            const bl=bullets[i];bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;
            if(bl.life<0){bullets.splice(i,1);continue;}
            for(let j=bots.length-1;j>=0;j--){
                if(collide(bl,bots[j])){
                    bots[j].health -= bl.dmg;
                    bullets.splice(i,1);
                    if(bots[j].health <= 0){bots.splice(j,1); kills++; checkWin();}
                    break;
                }
            }
        }
        for(let i=enemyBullets.length-1;i>=0;i--){
            const bl=enemyBullets[i];bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;
            if(bl.life<0){enemyBullets.splice(i,1);continue;}
            if(collide(bl,p) && !isDead){p.health -= bl.dmg; checkDeath(); enemyBullets.splice(i,1);}
        }
    }

    // MULTIPLAYER LOGIC
    if(gameMode==="multiplayer"){
        if(!isDead) sendData({type:'player',player:p});
        bullets.forEach((bl,i)=>{
            bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;
            if(bl.life<0){bullets.splice(i,1);return;}
            Object.entries(otherPlayers).forEach(([id,op])=>{
                if(collide(bl,op) && bl.team !== op.team){ 
                    sendData({type:'hit',target:id,dmg:bl.dmg,team:bl.team}); 
                    bullets.splice(i,1); kills++; 
                }
            });
        });
    }

    // UPDATE UI
    document.getElementById("health").textContent=Math.max(0,p.health);
    document.getElementById("enemies").textContent=gameMode==="solo"?bots.length:0;
    document.getElementById("players").textContent=Object.keys(otherPlayers).length;
    document.getElementById("kills").textContent=kills;
}

// DRAW FUNCTIONS
function drawGun(x,y,angle,color){
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillStyle="#222";
    ctx.fillRect(0, -3, 22, 6);
    ctx.fillStyle=color;
    ctx.fillRect(0, -2, 18, 4);
    ctx.restore();
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#553311"; platforms.forEach(pl=>ctx.fillRect(pl.x,pl.y,pl.w,pl.h));

    if(gameMode==="solo"){
        bots.forEach(b=>{
            ctx.fillStyle=b.color;
            ctx.fillRect(b.x,b.y,b.w,b.h);
            ctx.fillStyle="#000"; ctx.fillRect(b.x,b.y-10,b.w,6);
            ctx.fillStyle="#0F0"; ctx.fillRect(b.x,b.y-10,(b.health/b.maxHealth)*b.w,6);
            drawGun(b.x+b.w/2, b.y+b.h/2, b.angle, "#111");
        });
    }

    if(gameMode==="multiplayer"){
        Object.values(otherPlayers).forEach(op=>{
            ctx.fillStyle=op.color;ctx.fillRect(op.x,op.y,op.w,op.h);
            drawGun(op.x+op.w/2, op.y+op.h/2, op.angle, op.color);
        });
    }

    if(!isDead){
        ctx.fillStyle=p.color;ctx.fillRect(p.x,p.y,p.w,p.h);
        drawGun(p.x+p.w/2, p.y+p.h/2, p.angle, p.color);
    }

    bullets.forEach(bl=>{ctx.fillStyle=bl.team==="red"?"#ff6666":"#6699ff";ctx.beginPath();ctx.arc(bl.x,bl.y,bl.w,0,Math.PI*2);ctx.fill();});
    enemyBullets.forEach(bl=>{ctx.fillStyle="#F00";ctx.beginPath();ctx.arc(bl.x,bl.y,bl.w,0,Math.PI*2);ctx.fill();});
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
