<!DOCTYPE html>
<html>
<head>
    <title>2D Shooter - Rivals Style</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; overflow:hidden; }
        body { background:#222; display:flex; align-items:center; justify-content:center; height:100vh; }
        #ui { position:absolute; top:10px; left:10px; color:white; font-size:20px; z-index:10; }
        #crosshair { position:absolute; width:20px; height:20px; border:2px solid white; border-radius:50%; pointer-events:none; z-index:11; }
        #startScreen { position:absolute; inset:0; background:rgba(0,0,0,0.9); color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:20; }
        #startScreen h1 { font-size:50px; margin-bottom:20px; color:#00ccff; }
        #startScreen p { font-size:20px; margin-bottom:10px; }
        #startScreen button { padding:12px 30px; font-size:22px; background:#00ccff; color:black; border:none; border-radius:8px; cursor:pointer; }
        canvas { background:linear-gradient(#87CEEB, #f0f9ff); border:3px solid #444; }
    </style>
</head>
<body>

<div id="startScreen">
    <h1>2D SHOOTER</h1>
    <p>✅ JUMP • AIM • SHOOT — LIKE RIVALS</p>
    <p>WASD = Move & Jump | MOUSE = Aim | LEFT CLICK = Shoot</p>
    <button onclick="startGame()">PLAY NOW</button>
</div>

<div id="ui">
    <p>Health: <span id="health">100</span></p>
    <p>Enemies Left: <span id="enemies">2</span></p>
</div>
<div id="crosshair"></div>
<canvas id="gameCanvas" width="1000" height="600"></canvas>

<script>
// === GAME SETUP ===
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let crosshair = document.getElementById("crosshair");

let keys = {};
let mouse = {x:0, y:0, down:false};
let running = false;

// Player
let player = {
    x: 150, y: 300,
    w: 30, h: 50,
    speed: 5,
    vx: 0, vy: 0,
    jumpForce: -14,
    gravity: 0.6,
    onGround: false,
    health: 100,
    angle: 0 // aim angle
};

// Bullets
let bullets = [];
let bulletSpeed = 12;

// Enemies
let enemies = [
    {x: 700, y: 300, w:30, h:50, health:50, speed:2, dir:-1},
    {x: 400, y: 150, w:30, h:50, health:50, speed:2, dir:1}
];

// Platforms / Map
let platforms = [
    {x:0, y:550, w:1000, h:50},       // ground
    {x:200, y:450, w:150, h:20},
    {x:450, y:380, w:150, h:20},
    {x:700, y:300, w:150, h:20},
    {x:150, y:220, w:150, h:20},
    {x:600, y:180, w:150, h:20}
];

// === INPUT ===
document.addEventListener("keydown",e=>{keys[e.code]=true;});
document.addEventListener("keyup",e=>{keys[e.code]=false;});

document.addEventListener("mousemove",e=>{
    let rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
    crosshair.style.left = e.clientX + "px";
    crosshair.style.top = e.clientY + "px";
    // Calculate aim angle
    let dx = mouse.x - (player.x + player.w/2);
    let dy = mouse.y - (player.y + player.h/2);
    player.angle = Math.atan2(dy, dx);
});
document.addEventListener("mousedown",e=>{if(e.button===0) mouse.down=true;});
document.addEventListener("mouseup",e=>{if(e.button===0) mouse.down=false;});

// === COLLISION ===
function checkCollision(a,b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

// === UPDATE ===
function update() {
    if(!running) return;

    // --- PLAYER MOVEMENT ---
    // Left/Right
    if(keys["KeyA"]) player.vx = -player.speed;
    else if(keys["KeyD"]) player.vx = player.speed;
    else player.vx *= 0.88; // friction

    // Jump
    if(keys["KeyW"] && player.onGround) {
        player.vy = player.jumpForce;
        player.onGround = false;
    }

    // Gravity
    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;

    // Platform collision
    player.onGround = false;
    platforms.forEach(p=>{
        if(checkCollision(player, p)) {
            // Landing on top
            if(player.vy > 0 && player.y + player.h - player.vy <= p.y) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
            // Hit bottom
            else if(player.vy < 0 && player.y - player.vy >= p.y + p.h) {
                player.y = p.y + p.h;
                player.vy *= -0.3;
            }
            // Side collision
            else if(player.x + player.w > p.x && player.x < p.x + p.w) {
                if(player.vx > 0) player.x = p.x - player.w;
                if(player.vx < 0) player.x = p.x + p.w;
            }
        }
    });

    // Screen bounds
    if(player.x < 0) player.x = 0;
    if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;

    // --- SHOOTING ---
    if(mouse.down) {
        mouse.down = false; // one shot per click
        bullets.push({
            x: player.x + player.w/2,
            y: player.y + player.h/2,
            vx: Math.cos(player.angle) * bulletSpeed,
            vy: Math.sin(player.angle) * bulletSpeed,
            life: 120
        });
    }

    // --- UPDATE BULLETS ---
    bullets.forEach((b,i)=>{
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        if(b.life <=0 || b.x<0||b.x>canvas.width||b.y<0||b.y>canvas.height) bullets.splice(i,1);

        // Bullet vs enemy
        enemies.forEach((e,ei)=>{
            if(e.health >0 && b.x > e.x && b.x < e.x+e.w && b.y > e.y && b.y < e.y+e.h) {
                e.health -= 25;
                bullets.splice(i,1);
                if(e.health <=0) enemies.splice(ei,1);
            }
        });
    });

    // --- ENEMIES ---
    enemies.forEach(e=>{
        e.x += e.speed * e.dir;
        // Turn at edges
        if(e.x < 100 || e.x + e.w > canvas.width - 100) e.dir *= -1;

        // Simple enemy shoot at player
        let dx = player.x - e.x;
        let dy = player.y - e.y;
        let dist = Math.hypot(dx,dy);
        if(dist < 300 && Math.random() < 0.02) {
            let angle = Math.atan2(dy,dx);
            bullets.push({
                x: e.x + e.w/2, y: e.y + e.h/2,
                vx: Math.cos(angle)*8, vy: Math.sin(angle)*8,
                life:120, enemyBullet:true
            });
        }

        // Enemy bullet hit player
        bullets.forEach((b,i)=>{
            if(b.enemyBullet && b.x > player.x && b.x < player.x+player.w && b.y > player.y && b.y < player.y+player.h) {
                player.health -= 10;
                bullets.splice(i,1);
                if(player.health <=0) {
                    player.health = 0;
                    // Game over
                }
            }
        });
    });

    // --- UPDATE UI ---
    document.getElementById("health").textContent = player.health;
    document.getElementById("enemies").textContent = enemies.length;
}

// === DRAW ===
function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    // Platforms
    ctx.fillStyle = "#553311";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    // Player
    ctx.save();
    ctx.translate(player.x + player.w/2, player.y + player.h/2);
    ctx.fillStyle = "#0099ff";
    ctx.fillRect(-player.w/2, -player.h/2, player.w, player.h);
    // Gun
    ctx.rotate(player.angle);
    ctx.fillStyle = "#222";
    ctx.fillRect(0, -4, 30, 8);
    ctx.restore();

    // Bullets
    ctx.fillStyle = "#ffff00";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,4,0,Math.PI*2);
        ctx.fill();
    });

    // Enemies
    ctx.fillStyle = "#ff3300";
    enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));
}

// === GAME LOOP ===
function startGame() {
    running = true;
    document.getElementById("startScreen").style.display = "none";
    requestAnimationFrame(loop);
}
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
