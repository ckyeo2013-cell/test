<!DOCTYPE html>
<html>
<head>
    <title>Chaos Shooter - Fall Through + Less Bouncy Jump</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
        html, body { 
            background:#222; 
            height:100%; 
            width:100%;
            overflow:hidden; 
            position:fixed;
            touch-action:none; 
            cursor:default;
        }

        .screen {
            position:absolute; 
            inset:0; 
            background:rgba(0,0,0,0.92);
            color:white; 
            display:flex; 
            flex-direction:column;
            align-items:center; 
            justify-content:center; 
            z-index:1000;
            opacity:0; 
            pointer-events:none; 
            padding:20px; 
            transition:opacity 0.2s ease;
            gap: 14px;
            visibility:hidden;
        }
        .screen.active { 
            opacity:1; 
            pointer-events:all; 
            visibility:visible;
        }

        h1 { font-size:clamp(32px, 8vw, 50px); margin-bottom:10px; color:#ffcc00; text-shadow:0 0 10px #ffcc0077; text-align:center; }
        h2 { font-size:clamp(24px, 6vw, 36px); margin-bottom:15px; color:#ffffff; text-align:center; }
        p { font-size:clamp(16px, 4vw, 20px); margin-bottom:8px; text-align:center; }
        .error { color:#ff4444; font-size:16px; margin:4px 0; height:20px; }
        .room-info { font-size:22px; color:#0f0; font-weight:bold; margin:10px 0; }
        
        button {
            padding:clamp(12px, 3vw, 14px) clamp(24px, 5vw, 32px); 
            font-size:clamp(16px, 4vw, 20px); 
            background:#ffcc00; color:black; border:none; border-radius:8px;
            cursor:pointer; margin: 8px 0;
            box-shadow:0 4px 0 #aa8800;
            touch-action:manipulation; min-width:140px; font-weight:bold;
            transition: transform 0.1s, box-shadow 0.1s;
            position:relative; z-index:1100;
            pointer-events:all;
        }
        button.danger { background:#ff4444; box-shadow:0 4px 0 #aa2222; }
        button.small { padding:8px 18px; font-size:15px; min-width:110px; margin:4px 0; }
        button.team-red { background:#ff3333; color:white; box-shadow:0 4px 0 #aa2222; }
        button.team-blue { background:#3366ff; color:white; box-shadow:0 4px 0 #2244aa; }
        button.team-none { background:#888888; color:white; box-shadow:0 4px 0 #555555; }
        button.selected { border:3px solid #ffffff; transform:translateY(2px); box-shadow:none; }
        button:active { transform:translateY(4px); box-shadow:none; }
        input { 
            padding:12px; font-size:18px; text-align:center; width:240px; margin:6px 0; border-radius:6px; border:none; 
            position:relative; z-index:1100; pointer-events:all;
        }

        .team-selector {
            display:flex; gap:15px; margin:15px 0;
            position:relative; z-index:1100;
        }

        #ui { 
            position:absolute; top:10px; left:10px; color:white; font-size:17px; 
            z-index:500; background:rgba(0,0,0,0.5); padding:6px 10px; border-radius:8px; 
            line-height:1.4; pointer-events:none; 
        }
        #roomCode { 
            position:absolute; top:10px; right:10px; color:#0f0; font-size:20px; font-weight:bold; 
            z-index:500; background:rgba(0,0,0,0.5); padding:4px 8px; border-radius:6px; pointer-events:none; 
        }
        #crosshair { 
            position:absolute; width:20px; height:20px; border:2px solid white; border-radius:50%; 
            pointer-events:none; z-index:600; transform:translate(-50%, -50%); will-change: left, top; 
            display:none;
        }
        #leaveBtn { position:absolute; top:10px; left:50%; transform:translateX(-50%); z-index:700; }
        #resetText, #winText { 
            position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); 
            color:#ff4444; font-size:32px; font-weight:bold; z-index:800; 
            background:rgba(0,0,0,0.7); padding:15px 30px; border-radius:10px; display:none; 
            pointer-events:none; text-align:center;
        }
        #winText { color:#00ff44; font-size:40px; background:rgba(0,0,0,0.8); }
        #userInfoBar { 
            position:absolute; top:10px; left:10px; color:#ffcc00; font-weight:bold; 
            background:rgba(0,0,0,0.6); padding:4px 8px; border-radius:6px; z-index:500; 
            font-size:16px; pointer-events:none; 
        }

        #touchControls {
            position:absolute; bottom:30px; left:0; right:0;
            display:flex; justify-content:space-between;
            padding:0 40px; z-index:600; pointer-events:none; display:none;
        }
        .joystick-base {
            width:140px; height:140px;
            background:rgba(255,255,255,0.2);
            border-radius:50%; position:relative;
            pointer-events:auto; border:2px solid rgba(255,255,255,0.3);
            z-index:600;
        }
        .joystick-knob {
            width:50px; height:50px;
            background:rgba(255,255,255,0.8);
            border-radius:50%; position:absolute;
            top:50%; left:50%;
            transform:translate(-50%, -50%);
            pointer-events:none;
            box-shadow:0 0 8px rgba(0,0,0,0.4);
        }
        #attackJoystick { background:rgba(255, 100, 100, 0.2); border-color:rgba(255,100,100,0.3); }

        #c { 
            position:absolute;
            top:50%; left:50%;
            transform:translate(-50%, -50%);
            width:100vw;
            height:calc(100vw * 9 / 16);
            max-height:100vh;
            max-width:calc(100vh * 16 / 9);
            background:linear-gradient(#87CEEB, #f0f9ff);
            image-rendering:pixelated;
            border:none;
            z-index:100;
        }
        
        .user-tag {
            position: absolute;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            padding: 2px 5px;
            border-radius: 3px;
            pointer-events: none;
            white-space: nowrap;
            background:rgba(0,0,0,0.4);
            z-index:150;
        }
    </style>
</head>
<body>

<!-- DEVICE SCREEN -->
<div id="deviceScreen" class="screen active">
    <h1>CHAOS SHOOTER</h1>
    <p>Are you playing on PC or Mobile?</p>
    <button onclick="setDevice('pc')">💻 PC / LAPTOP</button>
    <button onclick="setDevice('mobile')">📱 MOBILE / TABLET</button>
</div>

<!-- LOGIN / REGISTER -->
<div id="loginScreen" class="screen">
    <h1>ACCOUNT</h1>
    <p id="loginTitle">Login or Create Account</p>
    <input type="text" id="user" placeholder="Username (3-12 chars)" maxlength="12">
    <input type="password" id="pass" placeholder="Password (min 4 chars)" maxlength="20">
    <div class="error" id="errorText"></div>
    <button onclick="handleLoginRegister()">CONTINUE</button>
    <button class="small" onclick="toggleMode()" id="modeBtn">Switch to Register</button>
</div>

<!-- MAIN MENU -->
<div id="homeScreen" class="screen">
    <h1>MAIN MENU</h1>
    <button onclick="startSolo()">SOLO MODE</button>
    <button onclick="showScreen('multiplayerLobby')">MULTIPLAYER</button>
</div>

<!-- MULTIPLAYER LOBBY -->
<div id="multiplayerLobby" class="screen">
    <h1>MULTIPLAYER LOBBY</h1>
    <div id="lobbyRoomInfo" class="room-info"></div>
    
    <div class="team-selector">
        <button class="team-red" id="btnRed" onclick="selectTeam('red')">RED TEAM</button>
        <button class="team-blue" id="btnBlue" onclick="selectTeam('blue')">BLUE TEAM</button>
        <button class="team-none" id="btnNone" onclick="selectTeam('none')">SPECTATE</button>
    </div>

    <p>Your Team: <span id="currentTeamDisplay">None</span></p>

    <button id="createBtn" onclick="createRoom()">CREATE NEW ROOM</button>
    <div>
        <input type="text" id="joinCodeInput" placeholder="ENTER ROOM CODE" maxlength="4">
        <button onclick="joinRoom()">JOIN ROOM</button>
    </div>
    <button class="small" onclick="showScreen('homeScreen')">BACK</button>
    <button class="small" id="startGameBtn" onclick="startMultiplayerGame()" style="display:none;">START GAME</button>
</div>

<!-- GAME UI -->
<div id="userInfoBar"></div>
<div id="ui">
    <p>❤️ <span id="health">100</span></p>
    <p>👹 <span id="enemies">0</span></p>
    <p>👥 <span id="players">0</span></p>
    <p>🔫 <span id="kills">0</span></p>
    <p>🎖️ TEAM: <span id="teamText">-</span></p>
</div>
<div id="roomCode">ROOM: <span id="codeText">---</span></div>
<button id="leaveBtn" class="small danger" style="display:none;" onclick="leaveGame()">LEAVE GAME</button>
<div id="resetText">YOU DIED! RESTARTING LEVEL...</div>
<div id="winText">🎉 LEVEL COMPLETE! 🎉<br><button onclick="startSolo()">PLAY AGAIN</button><br><button onclick="showScreen('homeScreen')">MAIN MENU</button></div>
<div id="crosshair"></div>
<canvas id="c" width="1920" height="1080"></canvas>

<!-- DUAL JOYSTICKS -->
<div id="touchControls">
    <div class="joystick-base" id="moveJoystick">
        <div class="joystick-knob" id="moveKnob"></div>
    </div>
    <div class="joystick-base" id="attackJoystick">
        <div class="joystick-knob" id="attackKnob"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ACCOUNT SYSTEM
let deviceType = "";
let loggedIn = false;
let currentUsername = "";
let isRegisterMode = false;

function getAccounts() {
    return JSON.parse(localStorage.getItem('gameAccounts') || '{}');
}
function saveAccount(user, pass) {
    let acc = getAccounts();
    acc[user] = pass;
    localStorage.setItem('gameAccounts', JSON.stringify(acc));
}

function setDevice(type) {
    deviceType = type;
    document.getElementById('deviceScreen').classList.remove('active');
    if (type === 'mobile') {
        document.getElementById('touchControls').style.display = 'flex';
        document.body.style.cursor = 'none';
    } else {
        document.body.style.cursor = 'default';
    }
    document.getElementById('loginScreen').classList.add('active');
}

function toggleMode() {
    isRegisterMode = !isRegisterMode;
    document.getElementById('loginTitle').textContent = isRegisterMode ? "Create New Account" : "Login to Your Account";
    document.getElementById('modeBtn').textContent = isRegisterMode ? "Switch to Login" : "Switch to Register";
    document.getElementById('errorText').textContent = "";
}

function handleLoginRegister() {
    const user = document.getElementById('user').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const err = document.getElementById('errorText');
    const accounts = getAccounts();

    if(!user || !pass) return err.textContent = "❌ Fill in both fields!";
    if(user.length < 3 || user.length > 12) return err.textContent = "❌ Username: 3-12 characters";
    if(pass.length < 4) return err.textContent = "❌ Password: min 4 characters";

    if(isRegisterMode) {
        if(accounts[user]) return err.textContent = "❌ Username already taken!";
        saveAccount(user, pass);
        loggedIn = true;
        currentUsername = user;
        document.getElementById('userInfoBar').textContent = "👤 " + currentUsername;
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('homeScreen').classList.add('active');
    } else {
        if(!accounts[user]) return err.textContent = "❌ Account not found — register first!";
        if(accounts[user] !== pass) return err.textContent = "❌ Wrong password!";
        loggedIn = true;
        currentUsername = user;
        document.getElementById('userInfoBar').textContent = "👤 " + currentUsername;
        document.getElementById('loginScreen').classList.remove('active');
        document.getElementById('homeScreen').classList.add('active');
    }
}

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    if(id) document.getElementById(id).classList.add('active');
    document.body.style.cursor = 'default';
    document.getElementById('crosshair').style.display = 'none';
}

// GAME SETUP
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let running = false;
let gameMode = "";
let keys = {};
let mouse = {x:canvas.width/2, y:canvas.height/2, down:false};
let kills = 0;
let isDead = false;

// PLAYER ✅ Jump adjusted: lower height, stronger gravity = less bouncy
let p = {
    x:300,y:900,w:60,h:100,
    vx:0,vy:0,
    speed:1.2, maxSpeed:10, friction:0.92, 
    jump:-22,        // ✅ Lower jump height
    gravity:0.85,    // ✅ Heavier gravity = falls faster, less bounce
    onGround:false,health:100, maxHealth:100,
    angle:0,lastShot:0,fireRate:600,bulletSpeed:24,id:Math.random().toString(36).substr(2,6),
    team: "none", color: "#888888", name: ""
};

// BOTS
let bots = [];
function resetBots() {
    bots = [
        {x:1600, y:900, w:60, h:100, health:100, maxHealth:100, 
         baseSpeed:2.2, speed:2.2, maxSpeed:14, 
         dir:-1, color:"#FF0000", vy:0, lastShot:0, onGround:false, 
         state:"patrol", detectRange:1400, attackRange:900, 
         lastDodge:0, lastMoveChange:0, flankSide:1, lineOfSight:true, angle:0,
         name: "Enemy 1"},
        {x:100, y:700, w:60, h:100, health:100, maxHealth:100, 
         baseSpeed:2.2, speed:2.2, maxSpeed:14,
         dir:1, color:"#FF2200", vy:0, lastShot:0, onGround:false, 
         state:"patrol", detectRange:1400, attackRange:900, 
         lastDodge:0, lastMoveChange:0, flankSide:-1, lineOfSight:true, angle:0,
         name: "Enemy 2"},
        {x:1700, y:440, w:60, h:100, health:100, maxHealth:100, 
         baseSpeed:2.2, speed:2.2, maxSpeed:14,
         dir:-1, color:"#FF4400", vy:0, lastShot:0, onGround:false, 
         state:"patrol", detectRange:1400, attackRange:900, 
         lastDodge:0, lastMoveChange:0, flankSide:1, lineOfSight:true, angle:0,
         name: "Enemy 3"}
    ];
}

// PLATFORMS ✅ First one = bottom ground (solid, can't fall through)
const platforms = [
    {x:0,y:1000,w:1920,h:80, solid:true, isGround:true}, // ✅ Marked as ground
    {x:400,y:840,w:300,h:40, solid:false, isGround:false},
    {x:900,y:700,w:300,h:40, solid:false, isGround:false},
    {x:1400,y:540,w:300,h:40, solid:false, isGround:false},
    {x:300,y:380,w:300,h:40, solid:false, isGround:false},
    {x:1200,y:300,w:300,h:40, solid:false, isGround:false}
];

let bullets = [];
let enemyBullets = [];

// MULTIPLAYER
let peer, roomId, connections = {}, otherPlayers = {};
let isHost = false;
let connectionAttempt = false;

function selectTeam(team) {
    p.team = team;
    if(team === 'red') p.color = '#ff3333';
    else if(team === 'blue') p.color = '#3366ff';
    else p.color = '#888888';

    document.querySelectorAll('.team-selector button').forEach(b=>b.classList.remove('selected'));
    if(team === 'red') document.getElementById('btnRed').classList.add('selected');
    if(team === 'blue') document.getElementById('btnBlue').classList.add('selected');
    if(team === 'none') document.getElementById('btnNone').classList.add('selected');
    document.getElementById('currentTeamDisplay').textContent = team.toUpperCase();

    if(peer && Object.keys(connections).length > 0) {
        sendData({type:'teamUpdate', team:p.team, color:p.color, name:p.name});
    }
}

function createRoom() {
    if(connectionAttempt) return;
    connectionAttempt = true;
    FULL_RESET();
    isHost = true;

    peer = new Peer(undefined, {
        debug: 0,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => {
        roomId = id.substr(0,4).toUpperCase();
        document.getElementById('lobbyRoomInfo').textContent = "ROOM CODE: " + roomId;
        document.getElementById('startGameBtn').style.display = 'block';
        gameMode = "multiplayer";
        p.name = currentUsername;
        showScreen('multiplayerLobby');
        connectionAttempt = false;
    });

    peer.on('connection', conn => {
        conn.on('open', () => {
            connections[conn.connectionId] = conn;
            conn.send({
                type: 'initFull',
                selfId: conn.connectionId,
                players: Object.values(otherPlayers),
                hostData: { name:p.name, team:p.team, color:p.color }
            });
            sendDataTo(conn, {type:'playerJoin', id:conn.connectionId, player:{name:p.name, team:p.team, color:p.color}});
        });

        conn.on('data', d => handleData(d, conn.connectionId));
        conn.on('close', () => { delete connections[conn.connectionId]; delete otherPlayers[conn.connectionId]; });
        conn.on('error', () => { delete connections[conn.connectionId]; delete otherPlayers[conn.connectionId]; });
    });

    peer.on('error', err => {
        alert("Error creating room: " + err.type);
        connectionAttempt = false;
    });
}

function joinRoom() {
    const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
    if(!code || connectionAttempt) return;
    connectionAttempt = true;
    FULL_RESET();
    isHost = false;
    roomId = code;

    peer = new Peer(undefined, {
        debug: 0,
        config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', () => {
        const conn = peer.connect(roomId, {reliable: true});

        conn.on('open', () => {
            connections[conn.connectionId] = conn;
            gameMode = "multiplayer";
            p.name = currentUsername;
            document.getElementById('lobbyRoomInfo').textContent = "JOINED ROOM: " + roomId;
            showScreen('multiplayerLobby');
            connectionAttempt = false;
        });

        conn.on('data', d => handleData(d, conn.connectionId));
        conn.on('close', () => {
            alert("Disconnected from room");
            showScreen('homeScreen');
            connectionAttempt = false;
        });

        conn.on('error', () => {
            alert("Failed to join — invalid code or room closed");
            connectionAttempt = false;
        });
    });

    peer.on('error', err => {
        alert("Connection error: " + err.type);
        connectionAttempt = false;
    });
}

function startMultiplayerGame() {
    running = true;
    isDead = false;
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById('leaveBtn').style.display = 'block';
    document.getElementById('codeText').textContent = roomId;
    document.getElementById('teamText').textContent = p.team.toUpperCase();
    document.getElementById('teamText').style.color = p.color;
    if(deviceType === 'pc') {
        document.body.style.cursor = 'none';
        document.getElementById('crosshair').style.display = 'block';
    }
    sendData({type:'gameStart'});
}

function handleData(d, senderId) {
    switch(d.type) {
        case 'initFull':
            otherPlayers = {};
            d.players.forEach(pl => otherPlayers[pl.id] = pl);
            otherPlayers['host'] = d.hostData;
            break;
        case 'playerUpdate':
            if(!otherPlayers[senderId]) otherPlayers[senderId] = {};
            Object.assign(otherPlayers[senderId], d.data);
            break;
        case 'teamUpdate':
            if(!otherPlayers[senderId]) otherPlayers[senderId] = {};
            Object.assign(otherPlayers[senderId], {team:d.team, color:d.color, name:d.name});
            break;
        case 'playerJoin':
            otherPlayers[d.id] = d.player;
            break;
        case 'bullet':
            bullets.push(d.bullet);
            break;
        case 'gameStart':
            if(!running) startMultiplayerGame();
            break;
    }
}

function sendData(data) {
    Object.values(connections).forEach(c => c.send(data));
}

function sendDataTo(conn, data) {
    conn.send(data);
}

function startSolo() {
    FULL_RESET();
    gameMode = "solo";
    resetBots();
    p.team = "none";
    p.color = "#0099ff";
    p.name = currentUsername;
    document.getElementById('teamText').textContent = "-";
    document.getElementById('winText').style.display = 'none';
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    running = true;
    isDead = false;
    document.getElementById('resetText').style.display = 'none';
    document.getElementById('leaveBtn').style.display = 'block';
    if(deviceType === 'pc') {
        document.body.style.cursor = 'none';
        document.getElementById('crosshair').style.display = 'block';
    }
}

function FULL_RESET() {
    running = false;
    gameMode = "";
    kills = 0;
    bullets = [];
    enemyBullets = [];
    isDead = false;
    p.x=300;p.y=900;p.vx=0;p.vy=0;p.health=100;
    p.name = currentUsername;

    if(peer) peer.destroy();
    peer = null;
    connections = {};
    otherPlayers = {};
    isHost = false;
    connectionAttempt = false;
    
    document.getElementById('codeText').textContent = "---";
    document.getElementById('startGameBtn').style.display = 'none';
    document.getElementById('resetText').style.display = 'none';
    document.getElementById('winText').style.display = 'none';
    document.getElementById('leaveBtn').style.display = 'none';
    document.getElementById('lobbyRoomInfo').textContent = "";
    document.querySelectorAll('.team-selector button').forEach(b=>b.classList.remove('selected'));
    document.getElementById('currentTeamDisplay').textContent = "None";
}

function leaveGame() {
    FULL_RESET();
    showScreen('homeScreen');
}

function checkDeath() {
    if(p.health <= 0 && !isDead) {
        isDead = true;
        p.health = 0;
        if(gameMode === 'solo') {
            document.getElementById('resetText').style.display = 'block';
            setTimeout(()=>startSolo(), 2500);
        } else {
            document.getElementById('resetText').textContent = "YOU DIED! RESPAWNING...";
            document.getElementById('resetText').style.display = 'block';
            setTimeout(()=>{
                isDead=false; p.health=p.maxHealth; p.x=300; p.y=900; document.getElementById('resetText').style.display='none';
            },3000);
        }
    }
}

function checkWin() {
    if(gameMode === 'solo' && bots.length === 0 && running) {
        running = false;
        document.getElementById('winText').style.display = 'block';
    }
}

// ✅ PC INPUT + CROSSHAIR
document.addEventListener("keydown",e=>keys[e.code]=true);
document.addEventListener("keyup",e=>keys[e.code]=false);
document.addEventListener("mousemove",e=>{
    const r=canvas.getBoundingClientRect();
    const scaleX = canvas.width / r.width;
    const scaleY = canvas.height / r.height;
    mouse.x=(e.clientX - r.left) * scaleX; 
    mouse.y=(e.clientY - r.top) * scaleY;
    document.getElementById('crosshair').style.left = e.clientX + 'px';
    document.getElementById('crosshair').style.top = e.clientY + 'px';
    if(!isDead && running){
        const dx = mouse.x - (p.x+p.w/2);
        const dy = mouse.y - (p.y+p.h/2);
        p.angle = Math.atan2(dy, dx);
    }
});
document.addEventListener("mousedown",e=>{if(e.button===0)mouse.down=true;});
document.addEventListener("mouseup",e=>{if(e.button===0)mouse.down=false;});

// ✅ MOBILE CONTROLS
let moveData = {active:false, startX:0, startY:0, dx:0, dy:0};
let attackData = {active:false, startX:0, startY:0, dx:0, dy:0};
const maxRange = 60;

const moveBase = document.getElementById('moveJoystick');
const moveKnob = document.getElementById('moveKnob');
const attackBase = document.getElementById('attackJoystick');
const attackKnob = document.getElementById('attackKnob');

moveBase.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    const r=moveBase.getBoundingClientRect();
    moveData.active=true;
    moveData.startX = r.left + r.width/2;
    moveData.startY = r.top + r.height/2;
    moveKnob.style.transform = `translate(-50%, -50%)`;
});
document.addEventListener('touchmove',e=>{
    if(!moveData.active) return;
    const t=e.touches[0];
    moveData.dx = t.clientX - moveData.startX;
    moveData.dy = t.clientY - moveData.startY;
    const dist = Math.hypot(moveData.dx, moveData.dy);
    if(dist > maxRange) {
        const scale = maxRange/dist;
        moveData.dx *= scale;
        moveData.dy *= scale;
    }
    moveKnob.style.transform = `translate(calc(-50% + ${moveData.dx}px), calc(-50% + ${moveData.dy}px))`;
});
document.addEventListener('touchend',()=>{
    moveData.active=false; moveData.dx=0; moveData.dy=0;
    moveKnob.style.transform = `translate(-50%, -50%)`;
});

attackBase.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    const r=attackBase.getBoundingClientRect();
    attackData.active=true;
    attackData.startX = r.left + r.width/2;
    attackData.startY = r.top + r.height/2;
    attackKnob.style.transform = `translate(-50%, -50%)`;
});
document.addEventListener('touchmove',e=>{
    if(!attackData.active || isDead || !running) return;
    const t=e.touches[0];
    attackData.dx = t.clientX - attackData.startX;
    attackData.dy = t.clientY - attackData.startY;
    const dist = Math.hypot(attackData.dx, attackData.dy);
    if(dist > maxRange) {
        const scale = maxRange/dist;
        attackData.dx *= scale;
        attackData.dy *= scale;
    }
    attackKnob.style.transform = `translate(calc(-50% + ${attackData.dx}px), calc(-50% + ${attackData.dy}px))`;
    if(dist > 10) {
        p.angle = Math.atan2(attackData.dy, attackData.dx);
        const cx = (p.x+p.w/2) + Math.cos(p.angle)*400;
        const cy = (p.y+p.h/2) + Math.sin(p.angle)*400;
        const rect = canvas.getBoundingClientRect();
        const scaleX = rect.width / canvas.width;
        const scaleY = rect.height / canvas.height;
        document.getElementById('crosshair').style.left = (rect.left + cx * scaleX) + 'px';
        document.getElementById('crosshair').style.top = (rect.top + cy * scaleY) + 'px';
    }
});
document.addEventListener('touchend',()=>{
    if(!attackData.active) return;
    attackData.active=false;
    attackKnob.style.transform = `translate(-50%, -50%)`;
    if(Math.hypot(attackData.dx, attackData.dy) > 10 && !isDead && running) shoot();
    attackData.dx=0; attackData.dy=0;
});

// ✅ COLLISION + FALL THROUGH LOGIC
function collide(a,b){return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;}

function checkPlatformCollision(obj, pl) {
    // Always collide with bottom ground
    if(pl.isGround) return collide(obj, pl);

    // ✅ If player presses S / Down + is on top → FALL THROUGH
    if(obj.onGround && (keys['KeyS'] || keys['ArrowDown'])) {
        return false; // No collision = fall through
    }

    // Normal jump-through behavior otherwise
    if (!pl.solid) {
        if (obj.vy >= 0 && 
            obj.y + obj.h <= pl.y + 20 && 
            obj.y + obj.h + obj.vy >= pl.y && 
            obj.x + obj.w > pl.x && 
            obj.x < pl.x + pl.w) {
            return true;
        }
        return false;
    }

    return collide(obj, pl);
}

function hasLineOfSight(a,b){
    let clear=true;
    platforms.forEach(pl=>{if(pl.solid && ((a.x<pl.x&&b.x>pl.x)||(a.x>pl.x&&b.x<pl.x))&&((a.y<pl.y&&b.y>pl.y)||(a.y>pl.y&&b.y<pl.y)))clear=false;});
    return clear;
}

function shoot() {
    const now = Date.now();
    if(now - p.lastShot < p.fireRate) return;
    p.lastShot = now;
    const b = {
        x:p.x+p.w/2, y:p.y+p.h/2, w:12, h:12,
        vx:Math.cos(p.angle)*p.bulletSpeed,
        vy:Math.sin(p.angle)*p.bulletSpeed,
        dmg:25, team:p.team
    };
    bullets.push(b);
    if(gameMode==="multiplayer") sendData({type:'bullet', bullet:b});
}

// UPDATE
function update(){
    if(!running)return;

    if(!isDead){
        let moveX=0;
        if(deviceType==='pc'){
            if(keys['KeyA'])moveX-=1;
            if(keys['KeyD'])moveX+=1;
            if(keys['KeyW']&&p.onGround){p.vy=p.jump;p.onGround=false;}
            if(mouse.down) shoot();
        }else{
            if(Math.abs(moveData.dx)>5) moveX = moveData.dx/maxRange;
            if(moveData.dy < -20 && p.onGround){p.vy=p.jump;p.onGround=false;}
        }
        p.vx += moveX * p.speed;
    }

    p.vx *= p.friction;
    p.vy += p.gravity;
    p.x += p.vx;
    p.y += p.vy;
    if(p.x<0)p.x=0;
    if(p.x+p.w>canvas.width)p.x=canvas.width-p.w;

    p.onGround=false;
    platforms.forEach(pl=>{
        if(checkPlatformCollision(p, pl)){
            if(p.vy >= 0) {
                p.y = pl.y - p.h;
                p.vy = 0;
                p.onGround = true;
            }
            if(pl.solid) {
                if(p.x+p.w - p.vx <= pl.x){p.x=pl.x-p.w;p.vx=0;}
                if(p.x - p.vx >= pl.x+pl.w){p.x=pl.x+pl.w;p.vx=0;}
            }
        }
    });
    if(p.y>canvas.height){p.y=canvas.height-p.h;p.vy=0;p.onGround=true;}

    if(gameMode==="solo"){
        bots.forEach(b=>{
            const distX=p.x-b.x;
            const distY=p.y-b.y;
            const dist=Math.hypot(distX,distY);
            b.angle=Math.atan2(p.y-(b.y+b.h/2),p.x-(b.x+b.w/2));
            b.lineOfSight=hasLineOfSight(b,p);

            let danger=false;
            bullets.forEach(bl=>{if(Math.hypot(bl.x-b.x,bl.y-b.y)<320&&Date.now()-b.lastDodge>800){danger=true;b.lastDodge=Date.now();}});
            if(danger){b.state="dodge";}
            else if(b.health<30){
                if(dist<600)b.state="retreat_smart";
                else if(dist>1000)b.state="advance_flank";
                else b.state="attack_careful";
            }
            else if(dist<b.attackRange&&b.lineOfSight)b.state="attack";
            else if(dist<b.detectRange)b.state="advance";
            else b.state="patrol";

            if(b.state==="patrol"){if(b.x<100||b.x+b.w>canvas.width-100)b.dir*=-1;b.speed=b.baseSpeed*0.9;}
            else if(b.state==="advance"){if(Date.now()-b.lastMoveChange>2000){b.flankSide*=-1;b.lastMoveChange=Date.now();}b.dir=(distX+b.flankSide*220)>0?1:-1;b.speed=b.baseSpeed*1.4;if(b.onGround&&distY<-120&&Math.abs(distX)<320&&Math.random()>0.75){b.vy=-22;b.onGround=false;}}
            else if(b.state==="attack"){if(!b.lineOfSight){b.dir=distX>0?1:-1;b.speed=b.baseSpeed*1.1;}else{if(Math.random()<0.01)b.dir*=-1;b.speed=b.baseSpeed*0.7;if(dist<360)b.dir*=-1;}}
            else if(b.state==="retreat_smart"){b.dir=distX>0?-1:1;b.speed=b.baseSpeed*2.2;if(b.onGround&&Math.random()>0.6)b.vy=-18;}
            else if(b.state==="advance_flank"){b.flankSide=distX>0?-1:1;b.dir=b.flankSide;b.speed=b.baseSpeed*1.8;}
            else if(b.state==="attack_careful"){b.speed=b.baseSpeed*0.4;b.dir=Math.random()>0.7?1:-1;}
            else if(b.state==="dodge"){b.speed=b.baseSpeed*2.5;}

            b.x += b.speed * b.dir;
            if(b.x<80){b.x=80;b.dir*=-1;}
            if(b.x+b.w>canvas.width-80){b.x=canvas.width-80-b.w;b.dir*=-1;}

            b.vy+=0.85;b.y+=b.vy;b.onGround=false;
            platforms.forEach(pl=>{if(checkPlatformCollision(b,pl)){if(b.vy>=0){b.y=pl.y-b.h;b.vy=0;b.onGround=true;}}});
            if(b.y>canvas.height){b.y=canvas.height-b.h;b.vy=0;b.onGround=true;}

            let fireRate = b.health<30?(dist<800?900:1400):(b.lineOfSight?(dist<600?700:1000):2200);
            if(b.state!=="retreat_smart"&&dist<b.attackRange&&Date.now()-b.lastShot>fireRate){
                b.lastShot=Date.now();
                enemyBullets.push({x:b.x+b.w/2,y:b.y+b.h/2,w:10,h:10,vx:Math.cos(b.angle)*18,vy:Math.sin(b.angle)*18,life:120,dmg:18});
            }
        });

        for(let i=bullets.length-1;i>=0;i--){
            const bl=bullets[i];bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;
            if(bl.life<0||bl.x<0||bl.x>canvas.width||bl.y<0||bl.y>canvas.height){bullets.splice(i,1);continue;}
            for(let j=bots.length-1;j>=0;j--){
                const bo=bots[j];
                if(collide(bl,bo)){bo.health-=bl.dmg;bullets.splice(i,1);if(bo.health<=0){bots.splice(j,1);kills++;checkWin();}break;}
            }
        }
        for(let i=enemyBullets.length-1;i>=0;i--){
            const bl=enemyBullets[i];bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;
            if(enemyBullets[i].life<0||bl.x<0||bl.x>canvas.width||bl.y<0||bl.y>canvas.height){enemyBullets.splice(i,1);continue;}
            if(collide(bl,p)){p.health-=bl.dmg;checkDeath();enemyBullets.splice(i,1);}
        }
    }

    if(gameMode==="multiplayer"){
        if(!isDead) sendData({type:'playerUpdate', data:{x:p.x,y:p.y,health:p.health,angle:p.angle}});
        bullets.forEach((bl,i)=>{bl.x+=bl.vx;bl.y+=bl.vy;bl.life--;if(bl.life<0||bl.x<0||bl.x>canvas.width||bl.y<0||bl.y>canvas.height)bullets.splice(i,1);});
    }

    document.getElementById("health").textContent=Math.max(0,p.health);
    document.getElementById("enemies").textContent=gameMode==="solo"?bots.length:0;
    document.getElementById("players").textContent=Object.keys(otherPlayers).length;
    document.getElementById("kills").textContent=kills;
}

// DRAW
function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#553311"; 
    platforms.forEach(pl=>{
        ctx.globalAlpha = pl.solid ? 1 : 0.85;
        ctx.fillRect(pl.x,pl.y,pl.w,pl.h);
        ctx.globalAlpha = 1;
    });

    function drawEntity(e,isPlayer=false){
        ctx.fillStyle=e.color || '#888';
        ctx.fillRect(e.x,e.y,e.w||60,e.h||100);
        ctx.fillStyle="#222"; ctx.fillRect(e.x,e.y-16,e.w||60,8);
        ctx.fillStyle=(e.team==="red"?"#ff3333":"#33ff33"); ctx.fillRect(e.x,e.y-16,(e.w||60)*((e.health||100)/100),8);
        
        ctx.save(); ctx.translate(e.x+(e.w||60)/2, e.y+(e.h||100)/2); ctx.rotate(e.angle||0);
        ctx.fillStyle="#222"; ctx.fillRect(0,-6,44,12); ctx.fillStyle=e.color || '#888'; ctx.fillRect(0,-4,36,8);
        ctx.restore();

        ctx.font="bold 24px Arial";
        const nameW = ctx.measureText(e.name || "Player").width;
        ctx.fillStyle="rgba(0,0,0,0.5)"; ctx.fillRect(e.x + (e.w||60)/2 - nameW/2 - 6, e.y - 44, nameW+12, 32);
        ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.fillText(e.name || "Player", e.x+(e.w||60)/2, e.y-20); ctx.textAlign="left";
    }

    if(gameMode==="solo") bots.forEach(drawEntity);
    if(!isDead) drawEntity({...p, maxHealth:p.maxHealth}, true);
    Object.values(otherPlayers).forEach(drawEntity);

    bullets.forEach(bl=>{ctx.fillStyle=bl.team==="red"?"#ff6666":"#66aaff";ctx.beginPath();ctx.arc(bl.x,bl.y,bl.w,0,Math.PI*2);ctx.fill();});
    enemyBullets.forEach(bl=>{ctx.fillStyle="#ff4444";ctx.beginPath();ctx.arc(bl.x,bl.y,bl.w,0,Math.PI*2);ctx.fill();});
}

function loop(){update();draw();requestAnimationFrame(loop);}
loop();
</script>
